name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for check-metrics (git rev-list --count HEAD)
          fetch-depth: 0

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain versions
        run: moon version --all

      # Metric drift guard: asserts that quantified numbers in docs (test
      # count, line count, commit count, package count, moon.mod/CHANGELOG,
      # and CLI_VERSION) match the actual repository state. Prevents
      # "docs claim 265 tests, repo has 277" drift. Exit 1 on mismatch.
      - name: Metric drift guard (check-metrics)
        run: node tools/check-metrics.mjs

      - name: Fixture rot guard (regenerate, must be byte-identical)
        run: |
          node tools/gen-fixtures.mjs
          git diff --exit-code tests/fixtures/packs

      # Cross-verification: re-computes digests and Merkle roots for all
      # golden fixture packs using Node.js crypto (independent of MoonBit),
      # then asserts they match the manifest's recorded values. Catches
      # digest/Merkle implementation drift between MoonBit and the reference.
      - name: Cross-verify golden packs (Node crypto vs MoonBit)
        run: node tools/cross-verify.mjs

      # Wycheproof vector guard: the Ed25519 test vectors are embedded in a
      # MoonBit wbtest file. This checks vector counts and attack-category
      # distribution so manual edits cannot silently drop oracle coverage.
      - name: Wycheproof Ed25519 vector guard
        run: node tools/check-wycheproof-ed25519.mjs

      # Manual branch coverage map drift guard: if a source file already
      # covered by docs/BRANCH_COVERAGE.md changes, that document must be
      # touched in the same diff so the branch map is explicitly reviewed.
      - name: Branch coverage stale guard
        run: node tools/check-branch-coverage-stale.mjs

      - name: Type check
        run: moon check

      # Format gate: the codebase was once normalized by `moon fmt` across all
      # 38 source files (RESULTS_LOG "moon fmt Normalization"). This step makes
      # any future fmt drift fail CI instead of silently accumulating.
      - name: Format check
        run: moon fmt --check

      - name: Run tests (wasm-gc + js)
        run: moon test --target wasm-gc,js

      - name: Build native
        run: moon build --target native

      # Native unit tests now run on ubuntu CI (runners ship gcc, so the
      # native backend can link and execute). Unit tests live in the pure
      # packages (canonjson/digest/merkle/model/diag/verify) and are
      # backend-agnostic; the cmd/main FFI paths stay covered by the
      # black-box suite below. Required step: if a native-only failure
      # surfaces, relax with `continue-on-error: true` and file an issue.
      - name: Run tests (native)
        run: moon test --target native

      - name: CLI black-box tests (native)
        shell: pwsh
        run: ./tools/cli-test.ps1 -Target native

      - name: CLI black-box tests (native, bash parity)
        run: ./tools/cli-test.sh native

      - name: Build wasm-gc
        run: moon build --target wasm-gc

      - name: Build js
        run: |
          moon build --target js
          moon build --target js --release src/api

      - name: CLI black-box tests (js)
        shell: pwsh
        run: ./tools/cli-test.ps1 -Target js

      - name: CLI black-box tests (js, bash parity)
        run: ./tools/cli-test.sh js

      - name: Browser adapter smoke (node over js artifact)
        run: node tools/smoke-api.mjs

      # Public JS API hardening: all exported string-in/string-out adapter
      # functions must reject malformed request envelopes without throwing and
      # must always return a JSON object with a boolean `ok` field.
      - name: Malformed API request fuzz (node over js artifact)
        run: node tools/fuzz-api-malformed.mjs --rounds 64

      # Public JS API semantic properties: valid randomized requests must
      # preserve end-to-end invariants across create/verify/proof, audit
      # append/sign/verify, and Ed25519 sign/verify tamper rejection.
      # Keep CI rounds bounded; run `--rounds 64` or higher manually when
      # doing release hardening.
      - name: API semantic property checks (node over js artifact)
        run: node tools/property-api-semantic.mjs --rounds 16

      # Differential crypto: compares the compiled MoonBit JS Ed25519 API
      # against Node.js crypto on deterministic random seeds/messages.
      # Use a bounded CI round count; run `--rounds 1000` manually for release
      # candidates when deeper sampling is needed.
      - name: Differential crypto (MoonBit JS vs Node crypto)
        run: node tools/differential-crypto.mjs --rounds 64

      # Differential digest: compares the compiled MoonBit JS digest API
      # against Node.js crypto for SHA-256, SHA-512, and HMAC-SHA256 over
      # deterministic random payloads including padding-boundary lengths.
      - name: Differential digest (MoonBit JS vs Node crypto)
        run: node tools/differential-digest.mjs --rounds 64

      # Mutation testing: rewrites one source byte at a time, runs the test
      # suite, and confirms at least one test went red. If a mutation slips
      # through (tests stay green), the test suite has a blind spot. This is
      # a blocking gate — mutation escapes are real test-quality bugs.
      - name: Mutation testing (mutation-check)
        run: node tools/mutation-check.mjs

  # Informational benchmark job (P2-2: explicitly non-blocking). Benchmark
  # timing is inherently noisy on shared runners, so regressions here must
  # not break the main CI flow. See RESULTS_LOG for local benchmark results.
  bench:
    needs: check-test-build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain versions
        run: moon version --all

      - name: Run benchmarks (js)
        run: moon bench --target js
